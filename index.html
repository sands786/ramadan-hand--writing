<!DOCTYPE html>
<html>
<head>
  <title>ramadan pen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Amiri:ital@1&display=swap');

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #050301; overflow: hidden; touch-action: none; }
    video { display: none; }
    canvas {
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      position: absolute;
      z-index: 1;
    }

    #credit {
      position: fixed;
      bottom: 110px;
      right: 18px;
      z-index: 20;
      font-family: 'Amiri', serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(245, 208, 97, 0.45);
      letter-spacing: 0.04em;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(245,208,97,0.25);
    }

    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Amiri', serif;
      font-size: 13px;
      color: rgba(245, 208, 97, 0.35);
      letter-spacing: 0.06em;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }

    /* ── Bottom control bar ── */
    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ctrl-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 1.8px solid rgba(245, 208, 97, 0.3);
      background: rgba(8, 5, 2, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      outline: none;
    }

    .ctrl-btn:active {
      transform: scale(0.93);
    }

    .ctrl-btn svg {
      width: 24px;
      height: 24px;
      pointer-events: none;
    }

    /* Draw toggle — bigger, centre */
    #drawBtn {
      width: 72px;
      height: 72px;
      border: 2px solid rgba(245, 208, 97, 0.45);
      order: 0;
    }

    #drawBtn.active {
      background: rgba(245, 208, 97, 0.15);
      border-color: #F5D061;
      box-shadow:
        0 0 18px rgba(245, 208, 97, 0.5),
        0 0 40px rgba(245, 208, 97, 0.2),
        inset 0 0 12px rgba(245, 208, 97, 0.08);
    }

    #undoBtn { order: -1; }
    #clearBtn { order: 1; }

    /* Mode label */
    #modeLabel {
      position: fixed;
      bottom: 106px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Amiri', serif;
      font-style: italic;
      font-size: 13px;
      color: rgba(245, 208, 97, 0);
      letter-spacing: 0.1em;
      pointer-events: none;
      text-align: center;
      transition: color 0.35s;
      white-space: nowrap;
    }
    #modeLabel.visible {
      color: rgba(245, 208, 97, 0.6);
    }
  </style>
</head>
<body>
  <video id="vid"></video>
  <canvas id="c"></canvas>

  <div id="credit">made by shahmeer</div>
  <div id="hint">hold shift to draw &nbsp;·&nbsp; space to clear</div>
  <div id="modeLabel">✦ drawing mode on ✦</div>

  <div id="controls">
    <!-- Undo -->
    <button class="ctrl-btn" id="undoBtn" title="Undo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 10h10a5 5 0 0 1 0 10H9" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="3 10 7 6 3 14" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Draw toggle (centre) -->
    <button class="ctrl-btn" id="drawBtn" title="Toggle drawing">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="4.5" fill="rgba(245,208,97,0.55)"/>
        <circle cx="12" cy="12" r="8.5" stroke="rgba(245,208,97,0.5)" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="11.5" stroke="rgba(245,208,97,0.18)" stroke-width="1"/>
      </svg>
    </button>

    <!-- Clear -->
    <button class="ctrl-btn" id="clearBtn" title="Clear all">
      <svg viewBox="0 0 24 24" fill="none">
        <polyline points="3 6 5 6 21 6" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19 6l-1 14H6L5 6" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 11v6M14 11v6" stroke="rgba(245,208,97,0.75)" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9 6V4h6v2" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script>
    var vid       = document.getElementById('vid');
    var c         = document.getElementById('c');
    var ctx       = c.getContext('2d');
    var drawBtn   = document.getElementById('drawBtn');
    var clearBtn  = document.getElementById('clearBtn');
    var undoBtn   = document.getElementById('undoBtn');
    var modeLabel = document.getElementById('modeLabel');
    var hint      = document.getElementById('hint');

    var arr  = [];
    var cur  = [];
    var shift = false;   // drawing mode flag
    var draw  = false;
    var sx = null, sy = null;
    var startTime = Date.now();

    // Hide desktop hint on mobile
    if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768) {
      hint.style.display = 'none';
    }

    /* ── Drawing mode toggle ── */
    function setDrawMode(on) {
      shift = on;
      if (on) {
        drawBtn.classList.add('active');
        modeLabel.classList.add('visible');
      } else {
        drawBtn.classList.remove('active');
        modeLabel.classList.remove('visible');
        draw = false;
      }
    }

    drawBtn.addEventListener('click',  function() { setDrawMode(!shift); });
    clearBtn.addEventListener('click', function() { arr = []; });
    undoBtn.addEventListener('click',  function() { if (arr.length > 0) arr.pop(); });

    /* Keyboard (desktop) */
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Shift') setDrawMode(true);
      if (e.code === 'Space') arr = [];
    });
    window.addEventListener('keyup', function(e) {
      if (e.key === 'Shift') setDrawMode(false);
    });

    /* ── Stars ── */
    var stars = [];
    for (var i = 0; i < 80; i++) {
      stars.push({
        x:       Math.random(),
        y:       Math.random() * 0.72,
        r:       Math.random() * 1.8 + 0.4,
        twinkle: Math.random() * Math.PI * 2,
        speed:   Math.random() * 0.02 + 0.005
      });
    }

    function drawStars(elapsed) {
      var t = elapsed / 1000;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var alpha = 0.3 + 0.5 * Math.sin(s.twinkle + t * s.speed * 10);
        ctx.save();
        ctx.shadowColor = '#fff';
        ctx.shadowBlur  = 5;
        ctx.fillStyle   = 'rgba(255,255,' + Math.floor(215 + 40 * Math.sin(t * s.speed * 5)) + ',' + alpha + ')';
        ctx.beginPath();
        ctx.arc(s.x * c.width, s.y * c.height, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    /* ── Moon ── */
    function drawMoon(elapsed) {
      var cycle    = 120000;
      var progress = (elapsed % cycle) / cycle;       // 0 → 1
      var moonFrac = 1.1 - progress * 1.25;           // bottom → above top
      var moonX    = c.width  * 0.80;
      var moonY    = c.height * moonFrac;
      var moonR    = Math.min(c.width, c.height) * 0.062; // responsive size

      // Soft ambient glow
      var grd = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 3.2);
      grd.addColorStop(0, 'rgba(245,208,97,0.16)');
      grd.addColorStop(1, 'rgba(245,208,97,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR * 3.2, 0, Math.PI * 2);
      ctx.fill();

      // Full golden circle
      ctx.save();
      ctx.shadowColor = '#F5D061';
      ctx.shadowBlur  = 36;
      ctx.fillStyle   = '#F5D061';
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Crescent bite
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.beginPath();
      ctx.arc(moonX + moonR * 0.42, moonY - moonR * 0.20, moonR * 0.82, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    /* ── Main render loop ── */
    function run(res) {
      c.width  = window.innerWidth;
      c.height = window.innerHeight;

      var elapsed = Date.now() - startTime;

      ctx.drawImage(res.image, 0, 0, c.width, c.height);

      // Night overlay
      ctx.fillStyle = 'rgba(5,3,1,0.92)';
      ctx.fillRect(0, 0, c.width, c.height);

      drawStars(elapsed);
      drawMoon(elapsed);

      // Drawn strokes
      ctx.shadowColor = '#F5D061';
      ctx.shadowBlur  = 15;
      ctx.strokeStyle = '#F5D061';
      ctx.lineWidth   = 6;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';

      for (var i = 0; i < arr.length; i++) {
        ctx.beginPath();
        for (var j = 0; j < arr[i].length; j++) {
          if (j === 0) ctx.moveTo(arr[i][j].x, arr[i][j].y);
          else         ctx.lineTo(arr[i][j].x, arr[i][j].y);
        }
        ctx.stroke();
      }

      // Hand landmarks
      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        var lm = res.multiHandLandmarks[0];
        drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'rgba(245,208,97,0.22)', lineWidth:2});
        drawLandmarks(ctx, lm, {color:'#FFFFFF', lineWidth:1, radius:2});

        var ind = lm[8];
        var rx  = ind.x * c.width;
        var ry  = ind.y * c.height;

        if (sx === null) { sx = rx; sy = ry; }
        else { sx += (rx - sx) * 0.45; sy += (ry - sy) * 0.45; }

        // Cursor
        ctx.beginPath();
        ctx.arc(sx, sy, 6, 0, Math.PI * 2);
        ctx.fillStyle = shift ? '#FFFFFF' : 'rgba(245,208,97,0.4)';
        ctx.fill();

        if (shift) {
          if (!draw) { draw = true; cur = []; arr.push(cur); }
          cur.push({x: sx, y: sy});
        } else {
          draw = false;
        }
      } else {
        draw = false;
        sx   = null;
      }
    }

    /* ── MediaPipe setup ── */
    var h = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    h.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    h.onResults(run);

    var cam = new Camera(vid, {
      onFrame: async () => { await h.send({image: vid}); },
      width: 1280,
      height: 720
    });
    cam.start();
  </script>
</body>
</html>
