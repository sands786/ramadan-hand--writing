<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>ramadan pen — by shahmeer</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0E0A1E;
      overflow: hidden;
      touch-action: none;
    }

    video { display: none; }

    canvas#c {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      z-index: 1;
    }

    /* ── Top hint ── */
    #hint {
      position: fixed; top: max(16px, env(safe-area-inset-top, 16px));
      left: 50%; transform: translateX(-50%);
      z-index: 20;
      font-family: 'Amiri', serif; font-size: clamp(12px, 3.5vw, 15px);
      color: rgba(245,208,97,0.45); letter-spacing: 0.06em;
      pointer-events: none; text-align: center; white-space: nowrap;
    }

    /* ── Mode label above buttons ── */
    #modeLabel {
      position: fixed;
      bottom: calc(max(28px, env(safe-area-inset-bottom, 28px)) + clamp(80px,20vw,100px) + 14px);
      left: 50%; transform: translateX(-50%);
      z-index: 20;
      font-family: 'Amiri', serif; font-style: italic;
      font-size: clamp(13px, 3.8vw, 16px);
      color: rgba(245,208,97,0); letter-spacing: 0.1em;
      pointer-events: none; text-align: center;
      transition: color 0.3s; white-space: nowrap;
    }
    #modeLabel.visible { color: rgba(245,208,97,0.7); }

    /* ── Credit ── */
    #credit {
      position: fixed;
      bottom: calc(max(28px, env(safe-area-inset-bottom, 28px)) + clamp(80px,20vw,100px) + 14px);
      right: max(16px, env(safe-area-inset-right, 16px));
      z-index: 20;
      font-family: 'Amiri', serif; font-style: italic;
      font-size: clamp(11px, 3vw, 14px);
      color: rgba(245,208,97,0.35); letter-spacing: 0.04em;
      pointer-events: none;
    }

    /* ── Bottom control bar ── */
    #controls {
      position: fixed;
      bottom: max(28px, env(safe-area-inset-bottom, 28px));
      left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 4vw, 22px);
      padding: 0 16px;
    }

    .ctrl-btn {
      flex-shrink: 0;
      width:  clamp(60px, 16vw, 82px);
      height: clamp(60px, 16vw, 82px);
      border-radius: 50%;
      border: 2px solid rgba(245,208,97,0.3);
      background: rgba(14,10,30,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.1s;
      outline: none;
      touch-action: manipulation;
      -webkit-user-select: none;
    }
    .ctrl-btn:active { transform: scale(0.90); }
    .ctrl-btn svg {
      width:  clamp(24px, 7vw, 34px);
      height: clamp(24px, 7vw, 34px);
      pointer-events: none;
    }

    /* Draw button — bigger, centre */
    #drawBtn {
      width:  clamp(76px, 20vw, 100px);
      height: clamp(76px, 20vw, 100px);
      border: 2.5px solid rgba(245,208,97,0.5);
    }
    #drawBtn svg {
      width:  clamp(30px, 9vw, 44px);
      height: clamp(30px, 9vw, 44px);
    }
    #drawBtn.active {
      background: rgba(245,208,97,0.14);
      border-color: #F5D061;
      box-shadow:
        0 0 20px rgba(245,208,97,0.55),
        0 0 50px rgba(245,208,97,0.2),
        inset 0 0 14px rgba(245,208,97,0.1);
    }

    /* Button label text under each button */
    .btn-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .btn-label {
      font-family: 'Amiri', serif;
      font-size: clamp(10px, 2.8vw, 13px);
      color: rgba(245,208,97,0.4);
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* ── Save overlay ── */
    #saveOverlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(10,6,22,0.96);
      align-items: center; justify-content: center;
      flex-direction: column;
      gap: clamp(12px, 3vh, 22px);
      padding: 20px;
    }
    #saveOverlay.show { display: flex; }

    #saveOverlay h2 {
      font-family: 'Amiri', serif; color: #F5D061;
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 700; letter-spacing: 0.1em; text-align: center;
      text-shadow: 0 0 24px rgba(245,208,97,0.45);
      margin: 0;
    }
    #saveOverlay p {
      font-family: 'Amiri', serif; color: rgba(245,208,97,0.5);
      font-size: clamp(12px, 3.5vw, 16px);
      text-align: center; letter-spacing: 0.05em; margin: 0;
    }
    #cardCanvas {
      border: 1px solid rgba(245,208,97,0.25);
      border-radius: 10px;
      max-width: 92vw;
      max-height: 38vh;
      object-fit: contain;
    }
    .save-row { display: flex; gap: clamp(10px, 3vw, 18px); flex-wrap: wrap; justify-content: center; }
    .save-action {
      font-family: 'Amiri', serif;
      font-size: clamp(14px, 4vw, 18px);
      letter-spacing: 0.08em;
      padding: clamp(12px,3.5vw,16px) clamp(22px,7vw,36px);
      border-radius: 40px; cursor: pointer;
      border: 1.5px solid rgba(245,208,97,0.4);
      background: transparent; color: #F5D061;
      transition: all 0.2s; outline: none;
      touch-action: manipulation;
    }
    .save-action:active { transform: scale(0.95); }
    .save-action.primary {
      background: rgba(245,208,97,0.15); border-color: #F5D061;
    }
  </style>
</head>
<body>
  <video id="vid" playsinline></video>
  <canvas id="c"></canvas>

  <div id="hint">✦ tap the circle to draw ✦</div>
  <div id="modeLabel">✦ drawing mode on ✦</div>
  <div id="credit">made by shahmeer</div>

  <div id="controls">
    <div class="btn-wrap">
      <button class="ctrl-btn" id="undoBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 10h10a5 5 0 0 1 0 10H9" stroke="rgba(245,208,97,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="3 10 7 6 3 14" stroke="rgba(245,208,97,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="btn-label">undo</span>
    </div>

    <div class="btn-wrap">
      <button class="ctrl-btn" id="clearBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <polyline points="3 6 5 6 21 6" stroke="rgba(245,208,97,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 6l-1 14H6L5 6" stroke="rgba(245,208,97,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 11v6M14 11v6" stroke="rgba(245,208,97,0.8)" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M9 6V4h6v2" stroke="rgba(245,208,97,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="btn-label">clear</span>
    </div>

    <div class="btn-wrap">
      <button class="ctrl-btn" id="drawBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4.5" fill="rgba(245,208,97,0.6)"/>
          <circle cx="12" cy="12" r="8.5" stroke="rgba(245,208,97,0.5)" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="11.5" stroke="rgba(245,208,97,0.2)" stroke-width="1"/>
        </svg>
      </button>
      <span class="btn-label">draw</span>
    </div>

    <div class="btn-wrap">
      <button class="ctrl-btn" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 15V3m0 12l-4-4m4 4l4-4" stroke="rgba(245,208,97,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 18v1a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1" stroke="rgba(245,208,97,0.8)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="btn-label">save</span>
    </div>
  </div>

  <!-- Save overlay -->
  <div id="saveOverlay">
    <h2>رمضان كريم</h2>
    <p>your greeting card is ready</p>
    <canvas id="cardCanvas"></canvas>
    <div class="save-row">
      <button class="save-action" id="cancelSave">cancel</button>
      <button class="save-action primary" id="downloadCard">download card</button>
    </div>
  </div>

  <script>
    /* ─── elements ─── */
    var vid          = document.getElementById('vid');
    var c            = document.getElementById('c');
    var ctx          = c.getContext('2d');
    var drawBtn      = document.getElementById('drawBtn');
    var clearBtn     = document.getElementById('clearBtn');
    var undoBtn      = document.getElementById('undoBtn');
    var saveBtn      = document.getElementById('saveBtn');
    var modeLabel    = document.getElementById('modeLabel');
    var hint         = document.getElementById('hint');
    var saveOverlay  = document.getElementById('saveOverlay');
    var cardCanvas   = document.getElementById('cardCanvas');
    var cancelSave   = document.getElementById('cancelSave');
    var downloadCard = document.getElementById('downloadCard');

    /* ─── state ─── */
    var arr       = [];
    var cur       = null;
    var shift     = false;
    var drawing   = false;
    var sx = null, sy = null;
    var prevSx = null, prevSy = null;
    var startTime = Date.now();
    var isMobile  = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;

    /* ─── particles ─── */
    var particles = [];

    function spawnParticles(x, y, speed) {
      var count = Math.floor(speed * 0.12 + 1);
      for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var vel   = Math.random() * 2.5 + 0.8;
        particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel - 1.2,
          life: 1.0,
          decay: Math.random() * 0.04 + 0.025,
          r: Math.random() * 2.5 + 1,
          gold: Math.random() > 0.35
        });
      }
    }

    function updateParticles() {
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.08;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.save();
        ctx.globalAlpha = p.life * 0.9;
        if (p.gold) {
          ctx.shadowColor = '#F5D061'; ctx.shadowBlur = 6;
          ctx.fillStyle = p.life > 0.5 ? '#FFF4AA' : '#F5D061';
        } else {
          ctx.shadowColor = '#fff'; ctx.shadowBlur = 4;
          ctx.fillStyle = '#FFFFFF';
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    /* ─── stars ─── */
    var stars = [];
    for (var i = 0; i < 90; i++) {
      stars.push({
        x: Math.random(), y: Math.random() * 0.72,
        r: Math.random() * 1.7 + 0.3,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.018 + 0.004
      });
    }

    function drawStars(elapsed) {
      var t = elapsed / 1000;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var alpha = 0.25 + 0.55 * Math.sin(s.twinkle + t * s.speed * 10);
        var px = s.x * c.width, py = s.y * c.height;
        ctx.save();
        ctx.globalAlpha = alpha;
        if (s.r > 1.5) {
          var sz = s.r * 3;
          ctx.fillStyle   = s.r > 1.8 ? '#F5D061' : '#FFFAE0';
          ctx.shadowColor = s.r > 1.8 ? '#F5D061' : '#fff';
          ctx.shadowBlur  = 8;
          ctx.beginPath();
          ctx.moveTo(px,        py - sz);
          ctx.lineTo(px+sz*.22, py - sz*.22);
          ctx.lineTo(px + sz,   py);
          ctx.lineTo(px+sz*.22, py + sz*.22);
          ctx.lineTo(px,        py + sz);
          ctx.lineTo(px-sz*.22, py + sz*.22);
          ctx.lineTo(px - sz,   py);
          ctx.lineTo(px-sz*.22, py - sz*.22);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.fillStyle   = '#fff';
          ctx.shadowColor = '#fff'; ctx.shadowBlur = 4;
          ctx.beginPath();
          ctx.arc(px, py, s.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    /* ─── draw mode toggle ─── */
    function setDrawMode(on) {
      shift = on;
      drawBtn.classList.toggle('active', on);
      modeLabel.classList.toggle('visible', on);
      if (!on) drawing = false;
      // update hint on mobile
      if (isMobile) {
        hint.textContent = on ? '✦ move finger to paint ✦' : '✦ tap the circle to draw ✦';
      }
    }

    drawBtn.addEventListener('click',  function() { setDrawMode(!shift); });
    clearBtn.addEventListener('click', function() { arr = []; particles = []; });
    undoBtn.addEventListener('click',  function() { if (arr.length > 0) arr.pop(); });
    saveBtn.addEventListener('click',  openSave);
    cancelSave.addEventListener('click',   function() { saveOverlay.classList.remove('show'); });
    downloadCard.addEventListener('click', doDownload);

    /* desktop keyboard */
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Shift') setDrawMode(true);
      if (e.code === 'Space') { arr = []; particles = []; }
    });
    window.addEventListener('keyup', function(e) {
      if (e.key === 'Shift') setDrawMode(false);
    });

    /* hide desktop hint on mobile */
    if (isMobile) {
      hint.style.display = 'block';
    }

    /* ─── greeting card ─── */
    function openSave() {
      var cc = cardCanvas;
      cc.width = 1200; cc.height = 675;
      var cx = cc.getContext('2d');

      var bg = cx.createLinearGradient(0, 0, 0, cc.height);
      bg.addColorStop(0, '#120D28'); bg.addColorStop(1, '#0A0618');
      cx.fillStyle = bg;
      cx.fillRect(0, 0, cc.width, cc.height);

      cx.save();
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var px = s.x * cc.width, py = s.y * cc.height;
        cx.globalAlpha = 0.5 + Math.random() * 0.4;
        if (s.r > 1.5) {
          var sz = s.r * 3.5;
          cx.fillStyle = s.r > 1.8 ? '#F5D061' : '#FFFAE0';
          cx.beginPath();
          cx.moveTo(px,        py - sz);
          cx.lineTo(px+sz*.22, py - sz*.22);
          cx.lineTo(px + sz,   py);
          cx.lineTo(px+sz*.22, py + sz*.22);
          cx.lineTo(px,        py + sz);
          cx.lineTo(px-sz*.22, py + sz*.22);
          cx.lineTo(px - sz,   py);
          cx.lineTo(px-sz*.22, py - sz*.22);
          cx.closePath(); cx.fill();
        } else {
          cx.fillStyle = '#fff';
          cx.beginPath(); cx.arc(px, py, s.r, 0, Math.PI * 2); cx.fill();
        }
      }
      cx.restore();

      cx.save();
      cx.translate(cc.width, 0); cx.scale(-1, 1);
      cx.shadowColor = '#F5D061'; cx.shadowBlur = 14;
      cx.strokeStyle = '#F5D061';
      cx.lineCap = 'round'; cx.lineJoin = 'round';
      for (var i = 0; i < arr.length; i++) {
        var stroke = arr[i];
        if (!stroke.pts || stroke.pts.length < 2) continue;
        cx.beginPath();
        for (var j = 0; j < stroke.pts.length; j++) {
          var px2 = stroke.pts[j].x * (cc.width / c.width);
          var py2 = stroke.pts[j].y * (cc.height / c.height);
          cx.lineWidth = (stroke.widths[j] || 6) * (cc.width / c.width) * 0.7;
          if (j === 0) cx.moveTo(px2, py2);
          else         cx.lineTo(px2, py2);
        }
        cx.stroke();
      }
      cx.restore();

      cx.save();
      cx.textAlign = 'center';
      cx.font = 'bold 58px Amiri, serif';
      cx.shadowColor = '#F5D061'; cx.shadowBlur = 32;
      cx.fillStyle = '#F5D061';
      cx.fillText('رمضان كريم', cc.width / 2, cc.height - 80);
      cx.font = 'italic 24px Amiri, serif';
      cx.fillStyle = 'rgba(245,208,97,0.5)'; cx.shadowBlur = 12;
      cx.fillText('Ramadan Kareem', cc.width / 2, cc.height - 36);
      cx.restore();

      cx.save();
      cx.font = 'italic 17px Amiri, serif';
      cx.fillStyle = 'rgba(245,208,97,0.28)';
      cx.textAlign = 'right';
      cx.fillText('made by shahmeer', cc.width - 24, cc.height - 14);
      cx.restore();

      saveOverlay.classList.add('show');
    }

    function doDownload() {
      var link = document.createElement('a');
      link.download = 'ramadan-kareem.png';
      link.href = cardCanvas.toDataURL('image/png');
      link.click();
      saveOverlay.classList.remove('show');
    }

    /* ─── main render ─── */
    function run(res) {
      c.width  = window.innerWidth;
      c.height = window.innerHeight;
      var elapsed = Date.now() - startTime;

      ctx.drawImage(res.image, 0, 0, c.width, c.height);
      ctx.fillStyle = 'rgba(15,10,30,0.78)';
      ctx.fillRect(0, 0, c.width, c.height);

      drawStars(elapsed);
      updateParticles();

      /* draw strokes */
      for (var i = 0; i < arr.length; i++) {
        var stroke = arr[i];
        if (!stroke.pts || stroke.pts.length < 2) continue;
        ctx.shadowColor = '#F5D061'; ctx.shadowBlur = 12;
        ctx.strokeStyle = '#F5D061';
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(stroke.pts[0].x, stroke.pts[0].y);
        for (var j = 1; j < stroke.pts.length; j++) {
          ctx.lineWidth = stroke.widths[j] || 4;
          ctx.lineTo(stroke.pts[j].x, stroke.pts[j].y);
          if (j % 3 === 0) {
            ctx.stroke(); ctx.beginPath();
            ctx.moveTo(stroke.pts[j].x, stroke.pts[j].y);
          }
        }
        ctx.stroke();
      }

      drawParticles();

      /* hand tracking */
      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        var lm = res.multiHandLandmarks[0];
        drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'rgba(245,208,97,0.18)', lineWidth:1.5});
        drawLandmarks(ctx,  lm, {color:'#FFFFFF', lineWidth:1, radius: isMobile ? 3 : 2});

        var ind = lm[8];
        var rx  = ind.x * c.width;
        var ry  = ind.y * c.height;

        if (sx === null) { sx = rx; sy = ry; }
        else { sx += (rx - sx) * 0.4; sy += (ry - sy) * 0.4; }

        /* bigger cursor on mobile */
        var cursorR = isMobile ? 10 : 6;
        ctx.save();
        ctx.beginPath();
        ctx.arc(sx, sy, cursorR, 0, Math.PI * 2);
        ctx.fillStyle   = shift ? '#FFFFFF' : 'rgba(245,208,97,0.45)';
        ctx.shadowColor = shift ? '#fff'    : '#F5D061';
        ctx.shadowBlur  = shift ? 16 : 10;
        ctx.fill();
        ctx.restore();

        if (shift) {
          var speed = 0;
          if (prevSx !== null) {
            var dx2 = sx - prevSx, dy2 = sy - prevSy;
            speed = Math.sqrt(dx2*dx2 + dy2*dy2);
          }
          /* calligraphy: slow = thick, fast = thin */
          var minW = isMobile ? 2 : 1.5;
          var maxW = isMobile ? 22 : 18;
          var width = Math.max(minW, Math.min(maxW, (isMobile ? 18 : 14) - speed * 0.38));

          if (!drawing) {
            drawing = true;
            cur = { pts: [], widths: [] };
            arr.push(cur);
          }
          cur.pts.push({x: sx, y: sy});
          cur.widths.push(width);
          spawnParticles(sx, sy, speed);
          prevSx = sx; prevSy = sy;
        } else {
          drawing = false;
          prevSx = null; prevSy = null;
        }
      } else {
        drawing = false;
        sx = prevSx = null;
      }
    }

    /* ─── MediaPipe ─── */
    var h = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    h.setOptions({
      maxNumHands: 1,
      modelComplexity: isMobile ? 0 : 1,   /* lighter model on mobile */
      minDetectionConfidence: 0.55,
      minTrackingConfidence: 0.5
    });
    h.onResults(run);

    /* use front camera on mobile, any camera on desktop */
    var cam = new Camera(vid, {
      onFrame: async () => { await h.send({image: vid}); },
      width:  isMobile ? 640 : 1280,
      height: isMobile ? 480 : 720,
      facingMode: 'user'
    });
    cam.start();
  </script>
</body>
</html>
