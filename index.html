<!DOCTYPE html>
<html>
<head>
  <title>ramadan pen — by shahmeer</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #0E0A1E; overflow: hidden; touch-action: none; }
    video { display: none; }
    canvas#c {
      width: 100%; height: 100%;
      transform: scaleX(-1);
      position: absolute; z-index: 1;
    }

    #credit {
      position: fixed; bottom: 110px; right: 18px; z-index: 20;
      font-family: 'Amiri', serif; font-style: italic; font-size: 14px;
      color: rgba(245,208,97,0.45); letter-spacing: 0.04em;
      pointer-events: none; text-shadow: 0 0 10px rgba(245,208,97,0.25);
    }
    #hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 20; font-family: 'Amiri', serif; font-size: 13px;
      color: rgba(245,208,97,0.35); letter-spacing: 0.06em;
      pointer-events: none; text-align: center; white-space: nowrap;
    }
    #modeLabel {
      position: fixed; bottom: 106px; left: 50%; transform: translateX(-50%);
      z-index: 20; font-family: 'Amiri', serif; font-style: italic; font-size: 13px;
      color: rgba(245,208,97,0); letter-spacing: 0.1em;
      pointer-events: none; text-align: center; transition: color 0.35s; white-space: nowrap;
    }
    #modeLabel.visible { color: rgba(245,208,97,0.6); }

    /* Controls */
    #controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: flex; align-items: center; gap: 12px;
    }
    .ctrl-btn {
      width: 54px; height: 54px; border-radius: 50%;
      border: 1.8px solid rgba(245,208,97,0.3);
      background: rgba(8,5,2,0.78);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.1s;
      user-select: none; touch-action: manipulation; outline: none;
    }
    .ctrl-btn:active { transform: scale(0.92); }
    .ctrl-btn svg { width: 22px; height: 22px; pointer-events: none; }
    #drawBtn {
      width: 70px; height: 70px;
      border: 2px solid rgba(245,208,97,0.45); order: 0;
    }
    #drawBtn.active {
      background: rgba(245,208,97,0.14); border-color: #F5D061;
      box-shadow: 0 0 18px rgba(245,208,97,0.5), 0 0 40px rgba(245,208,97,0.2),
                  inset 0 0 12px rgba(245,208,97,0.08);
    }
    #undoBtn  { order: -2; }
    #clearBtn { order: -1; }
    #saveBtn  { order: 1; }

    /* Save overlay */
    #saveOverlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(5,3,1,0.92); align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
    }
    #saveOverlay.show { display: flex; }
    #saveOverlay h2 {
      font-family: 'Amiri', serif; color: #F5D061; font-size: 22px;
      font-weight: 700; letter-spacing: 0.1em; text-align: center;
      text-shadow: 0 0 20px rgba(245,208,97,0.4);
    }
    #saveOverlay p {
      font-family: 'Amiri', serif; color: rgba(245,208,97,0.5);
      font-size: 13px; text-align: center; letter-spacing: 0.05em;
    }
    #previewCanvas {
      border: 1px solid rgba(245,208,97,0.25);
      border-radius: 8px; max-width: 88vw; max-height: 44vh;
    }
    .save-row { display: flex; gap: 14px; }
    .save-action {
      font-family: 'Amiri', serif; font-size: 14px; letter-spacing: 0.08em;
      padding: 12px 28px; border-radius: 40px; cursor: pointer;
      border: 1.5px solid rgba(245,208,97,0.4); background: transparent;
      color: #F5D061; transition: all 0.2s;
    }
    .save-action:hover { background: rgba(245,208,97,0.12); border-color: #F5D061; }
    .save-action.primary {
      background: rgba(245,208,97,0.15); border-color: #F5D061;
    }
    .save-action.primary:hover { background: rgba(245,208,97,0.28); }
  </style>
</head>
<body>
  <video id="vid"></video>
  <canvas id="c"></canvas>
  <canvas id="previewCanvas"></canvas>

  <div id="credit">made by shahmeer</div>
  <div id="hint">hold shift to draw &nbsp;·&nbsp; space to clear</div>
  <div id="modeLabel">✦ drawing mode on ✦</div>

  <div id="controls">
    <button class="ctrl-btn" id="undoBtn" title="Undo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 10h10a5 5 0 0 1 0 10H9" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="3 10 7 6 3 14" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="clearBtn" title="Clear">
      <svg viewBox="0 0 24 24" fill="none">
        <polyline points="3 6 5 6 21 6" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19 6l-1 14H6L5 6" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 11v6M14 11v6" stroke="rgba(245,208,97,0.75)" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9 6V4h6v2" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="drawBtn" title="Toggle drawing">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="4.5" fill="rgba(245,208,97,0.55)"/>
        <circle cx="12" cy="12" r="8.5" stroke="rgba(245,208,97,0.5)" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="11.5" stroke="rgba(245,208,97,0.18)" stroke-width="1"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="saveBtn" title="Save as greeting card">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 15V3m0 12l-4-4m4 4l4-4" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 18v1a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1" stroke="rgba(245,208,97,0.75)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Save overlay -->
  <div id="saveOverlay">
    <h2>رمضان كريم</h2>
    <p>your greeting card is ready</p>
    <canvas id="cardCanvas" style="border:1px solid rgba(245,208,97,0.25);border-radius:8px;max-width:88vw;max-height:44vh;"></canvas>
    <div class="save-row">
      <button class="save-action" id="cancelSave">cancel</button>
      <button class="save-action primary" id="downloadCard">download card</button>
    </div>
  </div>

  <script>
    /* ─── elements ─── */
    var vid       = document.getElementById('vid');
    var c         = document.getElementById('c');
    var ctx       = c.getContext('2d');
    var drawBtn   = document.getElementById('drawBtn');
    var clearBtn  = document.getElementById('clearBtn');
    var undoBtn   = document.getElementById('undoBtn');
    var saveBtn   = document.getElementById('saveBtn');
    var modeLabel = document.getElementById('modeLabel');
    var hint      = document.getElementById('hint');
    var saveOverlay  = document.getElementById('saveOverlay');
    var cardCanvas   = document.getElementById('cardCanvas');
    var cancelSave   = document.getElementById('cancelSave');
    var downloadCard = document.getElementById('downloadCard');

    /* ─── state ─── */
    var arr  = [];          // all strokes: [{pts, widths}]
    var cur  = null;        // current stroke
    var shift = false;
    var drawing = false;
    var sx = null, sy = null;
    var prevSx = null, prevSy = null;
    var startTime = Date.now();

    /* ─── particles ─── */
    var particles = [];

    function spawnParticles(x, y, speed) {
      var count = Math.floor(speed * 0.12 + 1);
      for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var vel   = Math.random() * 2.5 + 0.8;
        particles.push({
          x: x, y: y,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel - 1.2,
          life: 1.0,
          decay: Math.random() * 0.04 + 0.025,
          r: Math.random() * 2.5 + 1,
          gold: Math.random() > 0.35
        });
      }
    }

    function updateParticles() {
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.08; // gravity
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.save();
        ctx.globalAlpha = p.life * 0.9;
        if (p.gold) {
          ctx.shadowColor = '#F5D061';
          ctx.shadowBlur  = 6;
          ctx.fillStyle   = p.life > 0.5 ? '#FFF4AA' : '#F5D061';
        } else {
          ctx.shadowColor = '#fff';
          ctx.shadowBlur  = 4;
          ctx.fillStyle   = '#FFFFFF';
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    /* ─── stars ─── */
    var stars = [];
    for (var i = 0; i < 90; i++) {
      stars.push({
        x: Math.random(), y: Math.random() * 0.72,
        r: Math.random() * 1.6 + 0.3,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.018 + 0.004
      });
    }

    function drawStars(elapsed) {
      var t = elapsed / 1000;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var alpha = 0.25 + 0.55 * Math.sin(s.twinkle + t * s.speed * 10);
        // 4-point sparkle for bigger stars
        var sx2 = s.x * c.width, sy2 = s.y * c.height;
        ctx.save();
        ctx.globalAlpha = alpha;
        if (s.r > 1.5) {
          // draw 4-point star
          var sz = s.r * 3;
          ctx.fillStyle = s.r > 1.8 ? '#F5D061' : '#FFFAE0';
          ctx.shadowColor = s.r > 1.8 ? '#F5D061' : '#fff';
          ctx.shadowBlur  = 8;
          ctx.beginPath();
          ctx.moveTo(sx2,       sy2 - sz);
          ctx.lineTo(sx2 + sz*0.22, sy2 - sz*0.22);
          ctx.lineTo(sx2 + sz, sy2);
          ctx.lineTo(sx2 + sz*0.22, sy2 + sz*0.22);
          ctx.lineTo(sx2,       sy2 + sz);
          ctx.lineTo(sx2 - sz*0.22, sy2 + sz*0.22);
          ctx.lineTo(sx2 - sz, sy2);
          ctx.lineTo(sx2 - sz*0.22, sy2 - sz*0.22);
          ctx.closePath();
          ctx.fill();
        } else {
          // small dot star
          ctx.fillStyle = '#fff';
          ctx.shadowColor = '#fff'; ctx.shadowBlur = 4;
          ctx.beginPath();
          ctx.arc(sx2, sy2, s.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }



    /* ─── draw mode ─── */
    function setDrawMode(on) {
      shift = on;
      drawBtn.classList.toggle('active', on);
      modeLabel.classList.toggle('visible', on);
      if (!on) drawing = false;
    }

    drawBtn.addEventListener('click',  function() { setDrawMode(!shift); });
    clearBtn.addEventListener('click', function() { arr = []; particles = []; });
    undoBtn.addEventListener('click',  function() { if (arr.length > 0) arr.pop(); });
    saveBtn.addEventListener('click',  openSave);
    cancelSave.addEventListener('click', function() { saveOverlay.classList.remove('show'); });
    downloadCard.addEventListener('click', doDownload);

    window.addEventListener('keydown', function(e) {
      if (e.key === 'Shift') setDrawMode(true);
      if (e.code === 'Space') { arr = []; particles = []; }
    });
    window.addEventListener('keyup', function(e) {
      if (e.key === 'Shift') setDrawMode(false);
    });

    if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768) {
      hint.style.display = 'none';
    }

    /* ─── greeting card builder ─── */
    function openSave() {
      var cc = cardCanvas;
      cc.width  = 1200;
      cc.height = 675;
      var cx = cc.getContext('2d');

      // Background gradient
      var bg = cx.createLinearGradient(0, 0, 0, cc.height);
      bg.addColorStop(0, '#0A0610');
      bg.addColorStop(1, '#050301');
      cx.fillStyle = bg;
      cx.fillRect(0, 0, cc.width, cc.height);

      // Draw stars
      cx.save();
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var px2 = s.x * cc.width, py2 = s.y * cc.height;
        cx.globalAlpha = 0.5 + Math.random() * 0.4;
        if (s.r > 1.5) {
          var sz = s.r * 3.5;
          cx.fillStyle = s.r > 1.8 ? '#F5D061' : '#FFFAE0';
          cx.beginPath();
          cx.moveTo(px2, py2 - sz);
          cx.lineTo(px2 + sz*0.22, py2 - sz*0.22);
          cx.lineTo(px2 + sz, py2);
          cx.lineTo(px2 + sz*0.22, py2 + sz*0.22);
          cx.lineTo(px2, py2 + sz);
          cx.lineTo(px2 - sz*0.22, py2 + sz*0.22);
          cx.lineTo(px2 - sz, py2);
          cx.lineTo(px2 - sz*0.22, py2 - sz*0.22);
          cx.closePath();
          cx.fill();
        } else {
          cx.fillStyle = '#fff';
          cx.beginPath();
          cx.arc(px2, py2, s.r, 0, Math.PI * 2);
          cx.fill();
        }
      }
      cx.restore();

      // Replay strokes (mirrored back)
      cx.save();
      cx.translate(cc.width, 0);
      cx.scale(-1, 1);
      cx.shadowColor = '#F5D061'; cx.shadowBlur = 14;
      cx.strokeStyle = '#F5D061';
      cx.lineCap = 'round'; cx.lineJoin = 'round';
      for (var i = 0; i < arr.length; i++) {
        var stroke = arr[i];
        if (!stroke.pts || stroke.pts.length < 2) continue;
        cx.beginPath();
        for (var j = 0; j < stroke.pts.length; j++) {
          var px = stroke.pts[j].x * (cc.width / c.width);
          var py = stroke.pts[j].y * (cc.height / c.height);
          cx.lineWidth = (stroke.widths[j] || 6) * (cc.width / c.width) * 0.7;
          if (j === 0) cx.moveTo(px, py);
          else         cx.lineTo(px, py);
        }
        cx.stroke();
      }
      cx.restore();

      // Arabic text overlay
      cx.save();
      cx.textAlign = 'center';
      cx.font = 'bold 54px Amiri, serif';
      cx.shadowColor = '#F5D061'; cx.shadowBlur = 30;
      cx.fillStyle = '#F5D061';
      cx.fillText('رمضان كريم', cc.width / 2, cc.height - 80);
      cx.font = 'italic 22px Amiri, serif';
      cx.fillStyle = 'rgba(245,208,97,0.5)';
      cx.shadowBlur = 10;
      cx.fillText('Ramadan Kareem', cc.width / 2, cc.height - 36);
      cx.restore();

      // Credit
      cx.save();
      cx.font = 'italic 16px Amiri, serif';
      cx.fillStyle = 'rgba(245,208,97,0.3)';
      cx.textAlign = 'right';
      cx.fillText('made by shahmeer', cc.width - 24, cc.height - 16);
      cx.restore();

      saveOverlay.classList.add('show');
    }

    function doDownload() {
      var link = document.createElement('a');
      link.download = 'ramadan-kareem.png';
      link.href = cardCanvas.toDataURL('image/png');
      link.click();
      saveOverlay.classList.remove('show');
    }

    /* ─── main render ─── */
    function run(res) {
      c.width  = window.innerWidth;
      c.height = window.innerHeight;
      var elapsed = Date.now() - startTime;

      ctx.drawImage(res.image, 0, 0, c.width, c.height);
      ctx.fillStyle = 'rgba(15,10,30,0.78)';
      ctx.fillRect(0, 0, c.width, c.height);

      drawStars(elapsed);
      updateParticles();

      // Draw strokes with calligraphy width
      for (var i = 0; i < arr.length; i++) {
        var stroke = arr[i];
        if (!stroke.pts || stroke.pts.length < 2) continue;
        ctx.shadowColor = '#F5D061';
        ctx.shadowBlur  = 12;
        ctx.strokeStyle = '#F5D061';
        ctx.lineCap  = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(stroke.pts[0].x, stroke.pts[0].y);
        for (var j = 1; j < stroke.pts.length; j++) {
          ctx.lineWidth = stroke.widths[j] || 4;
          ctx.lineTo(stroke.pts[j].x, stroke.pts[j].y);
          if (j % 3 === 0) {
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(stroke.pts[j].x, stroke.pts[j].y);
          }
        }
        ctx.stroke();
      }

      drawParticles();

      // Hand
      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        var lm  = res.multiHandLandmarks[0];
        drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'rgba(245,208,97,0.18)', lineWidth:1.5});
        drawLandmarks(ctx, lm, {color:'#FFFFFF', lineWidth:1, radius:2});

        var ind = lm[8];
        var rx  = ind.x * c.width;
        var ry  = ind.y * c.height;

        if (sx === null) { sx = rx; sy = ry; }
        else { sx += (rx - sx) * 0.4; sy += (ry - sy) * 0.4; }

        // Cursor dot
        ctx.save();
        ctx.beginPath();
        ctx.arc(sx, sy, 6, 0, Math.PI * 2);
        ctx.fillStyle   = shift ? '#FFFFFF' : 'rgba(245,208,97,0.4)';
        ctx.shadowColor = shift ? '#fff'    : '#F5D061';
        ctx.shadowBlur  = shift ? 12 : 8;
        ctx.fill();
        ctx.restore();

        if (shift) {
          // Calligraphy: width = inverse of speed
          var speed = 0;
          if (prevSx !== null) {
            var dx = sx - prevSx, dy = sy - prevSy;
            speed = Math.sqrt(dx*dx + dy*dy);
          }
          var width = Math.max(1.5, Math.min(18, 14 - speed * 0.38));

          if (!drawing) {
            drawing = true;
            cur = { pts: [], widths: [] };
            arr.push(cur);
          }
          cur.pts.push({x: sx, y: sy});
          cur.widths.push(width);

          // Particles — more sparks when moving fast
          spawnParticles(sx, sy, speed);

          prevSx = sx; prevSy = sy;
        } else {
          drawing = false;
          prevSx = null; prevSy = null;
        }
      } else {
        drawing = false;
        sx = prevSx = null;
      }
    }

    /* ─── MediaPipe ─── */
    var h = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    h.setOptions({
      maxNumHands: 1, modelComplexity: 1,
      minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
    });
    h.onResults(run);

    var cam = new Camera(vid, {
      onFrame: async () => { await h.send({image: vid}); },
      width: 1280, height: 720
    });
    cam.start();
  </script>
</body>
</html>
